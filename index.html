<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="wellpass.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <title>WellPass</title>
  <style>
    :root {
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #fff;
      font-family: 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
    }

    .screen {
      height: 100dvh;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-section {
      flex-shrink: 0;
      width: 100%;
      line-height: 0;
    }

    .top-section img {
      width: 100%;
      display: block;
    }

    .bottom-section {
      flex: 1;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 24px 0;
    }

    .profile-photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .user-name {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 300;
      color: #6B3FA0;
      letter-spacing: 0.2px;
    }

    .venue-datetime {
      margin-top: 24px;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #444444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="top-section">
      <img src="background 2.jpg" alt="" />
    </div>
    <div class="bottom-section">
      <img class="profile-photo" src="profile.png" alt="Leo Braimont" />
      <span class="user-name">Leo Braimont</span>
      <span class="venue-datetime" id="venue-datetime"></span>
    </div>
  </div>

  <!-- Button fixed outside flow, always at bottom -->
  <div style="
    position: fixed;
    left: 0; right: 0;
    bottom: var(--safe-bottom);
    display: flex;
    justify-content: center;
    pointer-events: none;
  ">
    <div style="
      pointer-events: none;
      width: 90%;
      max-width: 400px;
      padding: 14px;
      border-radius: 50px;
      background: #5B35C5;
      color: #fff;
      font-family: 'Google Sans', sans-serif;
      font-size: 17px;
      font-weight: 500;
      text-align: center;
      cursor: default;
    ">Retour</div>
  </div>

  <script>
    (function () {
      const now = new Date();
      const months = ['janvier','février','mars','avril','mai','juin',
                      'juillet','août','septembre','octobre','novembre','décembre'];
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const dateStr = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} ${h}:${m}`;
      document.getElementById('venue-datetime').textContent = `RITM Ternes Paris – ${dateStr}`;
    })();
  </script>
</body>
</html>
