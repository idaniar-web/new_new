<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="wellpass.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <title>WellPass</title>
  <style>
    * { 
      margin: 0; padding: 0; box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; user-select: none; 
    }
    
    html, body { 
      height: 100%; 
      width: 100%; 
      overflow: hidden; 
      background: #fff; 
      /* Application de Montserrat par défaut */
      font-family: 'Montserrat', sans-serif; 
    }

    .screen { 
      position: relative;
      height: 100dvh; 
      width: 100%; 
      max-width: 430px; 
      margin: 0 auto; 
      display: flex; 
      flex-direction: column; 
    }

    .top-section { flex-shrink: 0; width: 100%; }
    .top-section img { width: 100%; display: block; }

    .bottom-section { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding: 40px 24px; 
      padding-bottom: 120px; 
      overflow-y: auto;
    }

    .profile-photo { 
        width: 80px; 
        height: 80px; 
        border-radius: 50%; 
        object-fit: cover; 
        margin-bottom: 12px;
    }

    .user-name { 
      font-size: 19px; 
      color: #6B3FA0; 
      font-weight: 500; 
      letter-spacing: -0.2px;
    }

    .venue-datetime { 
      margin-top: 25px; 
      font-size: 14.5px; 
      color: #555; /* Gris plus doux pour la date */
      text-align: center; 
      font-weight: 400;
      letter-spacing: 0.2px; /* Espacement subtil pour le look premium */
      line-height: 1.4;
    }

    .btn-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 999;
      background: #fff;
      display: flex;
      justify-content: center;
      padding: 15px 24px calc(20px + env(safe-area-inset-bottom));
    }

    @media (min-width: 431px) {
      .btn-wrap { left: 50%; transform: translateX(-50%); max-width: 430px; }
    }

    .btn-retour {
      width: 100%;
      padding: 17px;
      border-radius: 50px;
      background: #4A22C1; /* Violet légèrement plus profond selon l'image */
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
    }

    .btn-retour:active { opacity: 0.8; transform: scale(0.98); }
  </style>
</head>
<body>

  <div class="screen">
    <div class="top-section">
      <img src="background 2.jpg" alt="" />
    </div>

    <div class="bottom-section">
      <img class="profile-photo" src="profile.png" alt="Daniar" />
      <span class="user-name">Daniar Ibraimov</span>
      <span class="venue-datetime" id="venue-datetime"></span>
    </div>
  </div>

  <div class="btn-wrap">
    <div class="btn-retour" onclick="window.history.back()">Retour</div>
  </div>

  <script>
    (function () {
      const now = new Date();
      const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
      
      // Formatage identique à votre capture
      const day = now.getDate();
      const month = months[now.getMonth()];
      const year = now.getFullYear();
      const hours = String(now.getHours()).padStart(2,'0');
      const minutes = String(now.getMinutes()).padStart(2,'0');
      
      const dateStr = `${day} ${month} ${year} ${hours}:${minutes}`;
      document.getElementById('venue-datetime').textContent = `RITM Ternes Paris – ${dateStr}`;
    })();
  </script>
</body>
</html>
