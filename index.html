<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WellPass" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <title>WellPass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #fff;
    }

    .screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      font-family: 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* ── TOP: baked-in background image ── */
    .top-section {
      height: 50%;
      flex-shrink: 0;
      background-image: url('background 2.jpg');
      background-size: cover;
      background-position: center top;
    }

    /* ── BOTTOM ── */
    .bottom-section {
      flex: 1;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    /* Profile photo — sits well below the fold, no border/shadow */
    .profile-photo {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 28px;
    }

    .user-name {
      margin-top: 14px;
      font-size: 22px;
      font-weight: 300;
      color: #6B3FA0;
      letter-spacing: 0.2px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e8e8e8;
      margin: 18px 0;
    }

    .venue-datetime {
      font-size: 13px;
      font-weight: 400;
      color: #888888;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .spacer { flex: 1; }

    .btn-retour {
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      background: #1976D2;
      color: #ffffff;
      font-family: 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 17px;
      font-weight: 500;
      text-align: center;
      pointer-events: none;
      cursor: default;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="top-section"></div>

    <div class="bottom-section">
      <img class="profile-photo" src="profile.png" alt="Leo Braimont" />
      <span class="user-name">Leo Braimont</span>
      <div class="divider"></div>
      <span class="venue-datetime" id="venue-datetime"></span>
      <div class="spacer"></div>
      <div class="btn-retour">Retour</div>
    </div>
  </div>

  <script>
    (function () {
      const now = new Date();
      const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
      const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const dateStr = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} · ${h}:${m}`;
      document.getElementById('venue-datetime').textContent = `RITM ternes Paris · ${dateStr}`;
    })();
  </script>
</body>
</html>
