<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WellPass" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <title>WellPass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #fff;
    }

    .screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      font-family: 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    .top-section {
      flex-shrink: 0;
      height: 50%;
      background-image: url('background 2.jpg');
      background-size: auto 100%;
      background-position: center top;
      background-repeat: no-repeat;
      padding-top: env(safe-area-inset-top);
    }

    .bottom-section {
      flex: 1;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 24px 0;
      position: relative;
    }

    .profile-photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .user-name {
      margin-top: 10px;
      font-size: 20px;
      font-weight: 300;
      color: #6B3FA0;
      letter-spacing: 0.2px;
    }

    .venue-datetime {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 400;
      color: #444444;
      text-align: center;
    }

    .spacer { flex: 1; }

    .btn-retour {
      width: calc(100% - 32px);
      padding: 14px;
      border-radius: 50px;
      background: #5B35C5;
      color: #ffffff;
      font-family: 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 17px;
      font-weight: 500;
      text-align: center;
      pointer-events: none;
      cursor: default;
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      max-width: calc(430px - 32px);
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="top-section"></div>

    <div class="bottom-section">
      <img class="profile-photo" src="profile.png" alt="Leo Braimont" />
      <span class="user-name">Leo Braimont</span>
      <span class="venue-datetime" id="venue-datetime"></span>
    </div>
  </div>

  <div class="btn-retour">Retour</div>

  <script>
    (function () {
      const now = new Date();
      const months = ['janvier','février','mars','avril','mai','juin',
                      'juillet','août','septembre','octobre','novembre','décembre'];
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const dateStr = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} ${h}:${m}`;
      document.getElementById('venue-datetime').textContent = `RITM Ternes Paris – ${dateStr}`;
    })();
  </script>
</body>
</html>
