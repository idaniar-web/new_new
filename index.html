<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="wellpass.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <title>WellPass</title>
  <style>
    :root {
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      user-select: none; 
    }

    html, body { 
      height: 100%; 
      background: #fff; 
      font-family: 'Google Sans', -apple-system, sans-serif; 
    }

    /* Conteneur principal */
    .app { 
      min-height: 100vh;
      display: flex; 
      flex-direction: column; 
    }

    /* Section Image Haut */
    .top-section { 
      width: 100%; 
      line-height: 0; 
    }
    .top-section img { 
      width: 100%; 
      display: block; 
    }

    /* Section Contenu (Card style) */
    .content { 
      flex: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 24px 140px; /* Padding bas important pour ne pas cacher le texte derrière le bouton */
    }

    .profile-photo { 
      width: 72px; 
      height: 72px; 
      border-radius: 50%; 
      object-fit: cover; 
    }

    .user-name { 
      margin-top: 8px; 
      font-size: 18px; 
      font-weight: 300; 
      color: #6B3FA0; 
      letter-spacing: 0.2px; 
    }

    .venue-datetime { 
      margin-top: 24px; 
      font-size: 15px; 
      font-weight: 400; 
      color: #444; 
      text-align: center; 
    }

    /* POSITIONNEMENT DU BOUTON (Approche du 2ème code) */
    .btn-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(12px + var(--safe-bottom)); /* Aligné précisément sur le bas iOS */
      display: flex;
      justify-content: center;
      pointer-events: none; /* Le conteneur ne bloque pas le scroll */
      z-index: 100;
    }

    .btn-retour {
      pointer-events: auto; /* Le bouton reste cliquable */
      width: 90%;
      max-width: 400px;
      padding: 16px;
      border-radius: 50px;
      background: #5B35C5;
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(91, 53, 197, 0.25);
    }

    .btn-retour:active {
      opacity: 0.8;
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="top-section">
      <img src="background 2.jpg" alt="Header" />
    </div>

    <div class="content">
      <img class="profile-photo" src="profile.png" alt="Profile" />
      <span class="user-name">Leo Braimont</span>
      <span class="venue-datetime" id="venue-datetime"></span>
    </div>
  </div>

  <div class="btn-wrap">
    <a href="#" class="btn-retour" onclick="window.history.back()">Retour</a>
  </div>

  <script>
    (function () {
      const now = new Date();
      const months = ['janvier','février','mars','avril','mai','juin',
                      'juillet','août','septembre','octobre','novembre','décembre'];
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const dateStr = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} ${h}:${m}`;
      document.getElementById('venue-datetime').textContent = `RITM Ternes Paris – ${dateStr}`;
    })();

    if('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  </script>
</body>
</html>
